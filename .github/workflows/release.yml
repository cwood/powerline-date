name: Release

# "Click go": Actions tab -> Release -> Run workflow.
# Computes a CalVer version (YYYYMM.patch), tests, builds, publishes to PyPI,
# then tags the commit and cuts a GitHub Release.
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write   # push the version tag + create the GitHub Release
      id-token: write   # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'
          pytest

      - name: Compute CalVer version
        id: calver
        run: |
          base="$(date -u +%Y%m)"
          # patch = number of releases already cut this month; first is .0
          patch="$(git tag -l "${base}.*" | wc -l | tr -d ' ')"
          echo "version=${base}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.calver.outputs.version }}
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      # Tag + Release only after a successful publish, so a failed run does not
      # burn a patch number or leave an orphan release.
      - name: Tag and create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.calver.outputs.version }}"
          git tag "$version"
          git push origin "$version"
          gh release create "$version" dist/* --generate-notes
